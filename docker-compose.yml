services:
  backend:
    build: ./backend
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - /app/node_modules
    restart: unless-stopped

  mobile:
    build: ./mobile
    ports:
      - "8081:8081"
    volumes:
      - ./mobile:/app
      - /app/node_modules
    restart: unless-stopped